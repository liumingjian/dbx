# DBX v1 本地验证环境（实验床）
#
# 配置来源：GitHub issue #6「单机 Kafka + Connect 的大消息、资源与运维包络」第 7 节，
# 逐项标注了小节号。改任何一行前先读那份报告——大部分数字都有理由。
#
# 宿主机要求：≥16GB 内存、4 核、≥50GB 可用磁盘。低于 8GB 内存起不来。

services:
  mysql:
    image: mysql:8.0.40
    command:
      - --max-allowed-packet=268435456      # 256MiB：种子数据要在服务端拼 25MiB 的 BLOB
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --log-bin-trust-function-creators=1 # 种子脚本里的存储过程需要
    environment:
      MYSQL_ROOT_PASSWORD: dbx
      MYSQL_DATABASE: dbx_src
      MYSQL_USER: dbx
      MYSQL_PASSWORD: dbx
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      # 种子脚本要造 25MiB 随机 BLOB，首次启动慢；start_period 给足
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdbx"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  postgres:
    image: postgres:15.10
    environment:
      POSTGRES_DB: dbx_target
      POSTGRES_USER: dbx
      POSTGRES_PASSWORD: dbx
    command:
      - postgres
      - -c
      - max_wal_size=4GB                    # 20MB 单行写入会把默认 1GB 的 WAL 撑到频繁 checkpoint
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbx -d dbx_target"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0                # ≥3.6.0（#3 的版本下限结论：KIP-875 的 offset 端点）
    environment:
      # --- KRaft 单节点：broker 与 controller 合并进程 ---
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # --- 单节点必须全部降到 1，否则内部 topic 创建失败（#6 §4.1）---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # --- 20MB 大消息（#6 §1.2），26214400 = 25MiB ---
      KAFKA_MESSAGE_MAX_BYTES: 26214400        # 默认 1048588，不改则 broker 侧 MESSAGE_TOO_LARGE
      KAFKA_REPLICA_FETCH_MAX_BYTES: 26214400  # RF=1 时不生效，防御性设置
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      # --- topic 管理（#6 §5）---
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false" # 关键：否则会用 1MB 默认上限自动建出 topic
      KAFKA_NUM_PARTITIONS: 1                  # 单表单 topic，1 分区保序
      KAFKA_LOG_SEGMENT_BYTES: 268435456       # 256MiB，让 retention 能真正回收（活跃 segment 永不删）
      # --- 堆：Kafka 数据走 page cache，堆几乎不随数据量增长 ---
      KAFKA_HEAP_OPTS: "-Xms2g -Xmx2g"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  connect:
    build: ./connect                         # 见 connect/Dockerfile；先跑 ./fetch-plugins.sh
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_GROUP_ID: dbx-connect
      CONNECT_CONFIG_STORAGE_TOPIC: dbx-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: dbx-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: dbx-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1   # 单节点：三个内部 topic 都必须为 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_PLUGIN_PATH: /usr/share/java,/opt/dbx-plugins
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # --- rebalance：绝不能用 eager，否则每次开箱 stop-the-world（#6 §4.2）---
      CONNECT_CONNECT_PROTOCOL: sessioned
      CONNECT_SCHEDULED_REBALANCE_MAX_DELAY_MS: 30000
      CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY: All  # connector 级 override 的开关
      CONNECT_TOPIC_CREATION_ENABLE: "false"  # topic 由平台/人显式建，保证带上 max.message.bytes
      # --- worker 级兜底：所有 connector 的 producer/consumer 都吃这份（#6 §1.3）---
      CONNECT_PRODUCER_MAX_REQUEST_SIZE: 26214400
      CONNECT_PRODUCER_BUFFER_MEMORY: 134217728
      CONNECT_PRODUCER_COMPRESSION_TYPE: zstd
      CONNECT_PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION: 1
      CONNECT_CONSUMER_MAX_PARTITION_FETCH_BYTES: 26214400
      CONNECT_CONSUMER_FETCH_MAX_BYTES: 52428800
      # 默认 500 → 500×20MB 必 OOM。worker 级取最保守的 1；
      # 想测小表吞吐时在 connector 配置里写 consumer.override.max.poll.records=500 覆盖。
      CONNECT_CONSUMER_MAX_POLL_RECORDS: 1
      CONNECT_CONSUMER_MAX_POLL_INTERVAL_MS: 900000
      # --- 全套里最吃堆的组件（官方区间 0.5–4GB 取上限）---
      KAFKA_HEAP_OPTS: "-Xms2g -Xmx4g"
    ports:
      - "8083:8083"
    logging:                                 # 防日志写爆磁盘（#6 §6.2）
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  mysql-data:
  postgres-data:
  kafka-data:
